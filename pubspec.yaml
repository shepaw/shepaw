name: shepaw
description: Paw - Secure Mobile Platform
publish_to: 'none'
version: 1.0.10+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  emoji_picker_flutter: ^3.1.0
  
  # 状态管理 & 依赖注入
  provider: ^6.1.1
  get_it: ^9.2.1
  
  # 网络
  http: ^1.1.2
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # 安全 - 密码加密
  crypto: ^3.0.3
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  # Noise Protocol (E2E encryption with ACP agents) — X25519 + ChaCha20-Poly1305 + SHA-256
  cryptography: ^2.7.0
  
  # 工具
  uuid: ^4.3.3
  intl: ^0.20.2
  logger: ^2.0.2
  archive: ^3.4.9
  share_plus: ^7.2.1

  # 图片选择
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # 桌面端剪贴板图片
  pasteboard: ^0.3.0

  # 文件预览
  flutter_markdown: ^0.6.18
  markdown: ^7.3.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # 通知
  flutter_local_notifications: ^18.0.1
  local_notifier: ^0.1.6  # Windows 通知支持（flutter_local_notifications 不支持 Windows）

  # 权限
  permission_handler: ^11.2.0

  # 二维码扫描（v2.1 shepaw://pair 配对）
  mobile_scanner: ^5.2.0
  # 二维码生成（P2P 配对 QR 展示）
  qr_flutter: ^4.1.0

  # 音频
  record: ^5.1.2
  audioplayers: ^6.1.0

  # 文件打开
  open_file: ^3.3.2

  # URL 打开
  url_launcher: ^6.2.2
  scrollable_positioned_list: ^0.3.8

  # 应用版本信息
  package_info_plus: ^8.0.0

  # 桌面端多窗口
  desktop_multi_window: ^0.3.0

  # 后台保活（Android Foreground Service）
  flutter_foreground_task: ^8.10.0

  # 向量数据库 & Embedding
  veda: ^0.1.0
  tflite_flutter: ^0.12.1

dependency_overrides:
  record_linux: ^1.3.0
  # path_provider_foundation 2.6.0 pulls in objective_c 9.x which fails to load
  # on macOS because the framework is not bundled by Flutter's build system.
  # Pin to 2.4.x which uses the older FFI approach without objective_c.dylib.
  path_provider_foundation: '>=2.4.0 <2.5.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
